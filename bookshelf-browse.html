<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Books - AuthorKit Bookshelf</title>
    <meta name="description" content="Browse and filter books from self-publishing authors powered by AuthorKit.">
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">



    <!-- Critical CSS for mobile rendering -->
    <style id="critical-css">
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{font-family:'Source Serif 4',serif;font-size:16px;line-height:1.7;background:#FFFFFF;color:#000000;-webkit-font-smoothing:antialiased}
        body{font-size:18px;margin:0}
        .nav-bar{background:#FFFFFF;border-bottom:1px solid #000000;position:sticky;top:0;z-index:50}
        .nav-container{max-width:1280px;margin:0 auto;padding:0 1rem}
        .nav-logo{height:40px;width:auto}
        .nav-link{color:#000000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:500;text-decoration:none}
        .flex{display:flex}
        .items-center{align-items:center}
        .justify-between{justify-content:space-between}
        .h-16{height:4rem}
        .hidden{display:none}
        .mobile-menu{position:absolute;top:100%;right:16px;background:#FFFFFF;border:1px solid #000000;width:200px;z-index:100}
        .mobile-menu-button{background:transparent;border:none;cursor:pointer;padding:8px}
        .mobile-menu-icon{height:24px;stroke:#000000;stroke-width:2;width:24px}
        .mobile-nav-link{display:block;padding:16px 24px;color:#000000;border-bottom:1px solid rgba(0,0,0,.1);text-decoration:none}
        .mobile-nav-link:last-child{border-bottom:none}
        .btn-primary{background:#000000;border:2px solid #000000;color:#FFFFFF;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:600;min-height:44px;padding:12px 24px;text-decoration:none}
        .btn-secondary{background:#FFFFFF;border:2px solid #000000;color:#000000;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:600;min-height:44px;padding:12px 24px;text-decoration:none}
        .btn-accent{background:#FF9900;border:2px solid #FF9900;color:#FFFFFF;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;font-weight:600;min-height:44px;padding:12px 24px;text-decoration:none}
        .footer-container{background:#FFFFFF;border-top:1px solid #000000;padding:64px 0 32px}
        .footer-wrapper{max-width:1280px;margin:0 auto;padding:0 32px}
        .footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:48px;margin-bottom:48px}
        .footer-heading{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#000000;margin-bottom:16px}
        .footer-text{font-family:'Source Serif 4',serif;font-size:16px;line-height:1.6;color:#000000;margin-bottom:8px}
        .footer-link{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;color:#000000;text-decoration:none;display:block;padding:4px 0}
        .footer-link:hover{text-decoration:underline}
        .footer-list{list-style:none;padding:0;margin:0}
        .footer-list li{margin-bottom:8px}
        .footer-bottom{border-top:1px solid rgba(0,0,0,.1);padding-top:32px;margin-top:48px;text-align:center}
        .footer-copyright{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:16px;color:#000000}
        @media (min-width:1024px){.lg\:flex{display:flex}.lg\:hidden{display:none}.nav-container{padding:0 2rem}}
    </style>

    <link rel="stylesheet" href="css/styles.min.css">
    <link rel="stylesheet" href="css/bookshelf.css">

    <style>
        /* Monochrome Design Overrides */
        * {
            border-radius: 0 !important;
            box-shadow: none !important;
            transition: none !important;
        }

        body {
            background: #FFFFFF;
            color: #000000;
            font-family: 'Source Serif 4', serif;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Header */
        .site-header {
            background: #FFFFFF;
            border-bottom: 1px solid #000000;
        }

        /* Browse Header */
        .browse-header {
            background: #FFFFFF;
            padding: 3rem 1rem 2rem;
            border-bottom: 1px solid #000000;
        }

        .browse-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            line-height: 1.2;
            color: #000000;
            margin-bottom: 0.5rem;
        }

        .browse-header p {
            font-family: 'Source Serif 4', serif;
            font-size: 1.25rem;
            line-height: 1.7;
            color: #000000;
        }

        /* Browse Layout */
        .browse-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 3rem;
            margin: 2rem 0;
        }

        @media (max-width: 1024px) {
            .browse-layout {
                grid-template-columns: 1fr;
            }

            .browse-sidebar {
                order: 2;
            }

            .browse-main {
                order: 1;
            }
        }

        /* Sidebar */
        .browse-sidebar {
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .filter-section {
            margin-bottom: 2rem;
        }

        .filter-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: #000000;
            margin-bottom: 1rem;
        }

        /* Search Input */
        .search-input {
            width: 100%;
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 12px 16px;
            font-family: 'Source Serif 4', serif;
            font-size: 1rem;
            color: #000000;
            min-height: 44px;
        }

        .search-input:focus {
            border: 2px solid #000000;
            outline: none;
        }

        /* Genre Checkboxes */
        .genre-filters {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .genre-checkbox {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-family: 'Source Serif 4', serif;
            font-size: 0.9375rem;
            color: #000000;
        }

        .genre-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border: 1px solid #000000;
            cursor: pointer;
        }

        .genre-checkbox input[type="checkbox"]:focus {
            outline: 2px solid #000000;
            outline-offset: 2px;
        }

        /* Sort Select */
        .sort-select {
            width: 100%;
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 12px 16px;
            font-family: 'Source Serif 4', serif;
            font-size: 1rem;
            color: #000000;
            min-height: 44px;
        }

        .sort-select:focus {
            border: 2px solid #000000;
            outline: none;
        }

        /* Reset Button */
        .btn-reset {
            width: 100%;
            background: #FFFFFF;
            color: #000000;
            border: 2px solid #000000;
            padding: 12px 24px;
            font-family: 'Source Serif 4', serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            min-height: 44px;
        }

        .btn-reset:hover {
            background: #000000;
            color: #FFFFFF;
        }

        /* Browse Controls */
        .browse-controls {
            margin-bottom: 1.5rem;
        }

        .results-count {
            font-family: 'Source Serif 4', serif;
            font-size: 1rem;
            font-weight: 600;
            color: #000000;
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .book-card {
            background: #FFFFFF;
            border: 1px solid #000000;
            padding: 1.5rem;
            text-decoration: none;
            color: #000000;
        }

        .book-card:hover {
            border: 2px solid #000000;
            margin: -1px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin: 3rem 0;
        }

        .pagination button {
            background: #FFFFFF;
            color: #000000;
            border: 2px solid #000000;
            padding: 8px 16px;
            font-family: 'Source Serif 4', serif;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            min-width: 44px;
        }

        .pagination button:hover:not(:disabled) {
            background: #000000;
            color: #FFFFFF;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination button.active {
            background: #000000;
            color: #FFFFFF;
        }

        /* Footer */
        .site-footer {
            background: #000000;
            color: #FFFFFF;
            padding: 3rem 1rem 1.5rem;
            border-top: 1px solid #000000;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-col h4 {
            color: #FFFFFF;
            font-family: 'Playfair Display', serif;
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }

        .footer-col p,
        .footer-col a {
            color: #FFFFFF;
            font-family: 'Source Serif 4', serif;
            font-size: 0.9375rem;
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .footer-col a:hover {
            text-decoration: underline;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #FFFFFF;
        }

        .footer-bottom p {
            color: #FFFFFF;
            font-family: 'Source Serif 4', serif;
            font-size: 0.875rem;
        }

        /* Loading and Error States */
        .loading,
        .error {
            font-family: 'Source Serif 4', serif;
            text-align: center;
            padding: 3rem 1rem;
            color: #000000;
        }

        /* Buttons */
        .btn-primary {
            background: #000000;
            color: #FFFFFF;
            border: 2px solid #000000;
            padding: 12px 24px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #FFFFFF;
            color: #000000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .browse-header h1 {
                font-size: 2rem;
            }

            .browse-header p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <!-- Header (Loaded from shared component) -->
    <div id="header-placeholder"></div>

    <!-- Browse Header -->
    <section class="browse-header">
        <div class="container">
            <h1>Browse Books</h1>
            <p>Discover your next great read from independent authors</p>
        </div>
    </section>

    <!-- Browse Content -->
    <section class="browse-content">
        <div class="container">
            <div class="browse-layout">

                <!-- Sidebar: Filters -->
                <aside class="browse-sidebar">
                    <div class="filter-section">
                        <h3>Search</h3>
                        <input type="text" id="search-input" placeholder="Search by title or author..." class="search-input">
                    </div>

                    <div class="filter-section">
                        <h3>Genre</h3>
                        <div class="genre-filters" id="genre-filters">
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="all" checked>
                                <span>All Genres</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="action-adventure">
                                <span>Action & Adventure</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="childrens">
                                <span>Children's Books</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="fantasy">
                                <span>Fantasy</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="historical-fiction">
                                <span>Historical Fiction</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="horror">
                                <span>Horror</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="literary-fiction">
                                <span>Literary Fiction</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="mystery-crime">
                                <span>Mystery & Crime</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="non-fiction">
                                <span>Non-Fiction</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="poetry">
                                <span>Poetry</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="romance">
                                <span>Romance</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="science-fiction">
                                <span>Science Fiction</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="self-help">
                                <span>Self-Help</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="thriller-suspense">
                                <span>Thriller & Suspense</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="young-adult">
                                <span>Young Adult</span>
                            </label>
                            <label class="genre-checkbox">
                                <input type="checkbox" name="genre" value="other">
                                <span>Other</span>
                            </label>
                        </div>
                    </div>

                    <div class="filter-section">
                        <h3>Sort By</h3>
                        <select id="sort-select" class="sort-select">
                            <option value="latest">Latest Added</option>
                            <option value="oldest">Oldest First</option>
                            <option value="title-asc">Title (A-Z)</option>
                            <option value="title-desc">Title (Z-A)</option>
                        </select>
                    </div>

                    <button class="btn-reset" id="reset-filters">Reset Filters</button>
                </aside>

                <!-- Main: Books Grid -->
                <main class="browse-main">
                    <div class="browse-controls">
                        <p class="results-count" id="results-count">Loading...</p>
                    </div>

                    <div class="books-grid" id="books-grid">
                        <div class="loading">Loading books...</div>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination" id="pagination">
                        <!-- Pagination buttons loaded dynamically -->
                    </div>
                </main>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <!-- Footer (Loaded from shared component) -->
    <div id="footer-placeholder"></div>

    <!-- JavaScript (deferred for optimal performance) -->
    <script src="js/header-loader.js" defer></script>
    <script src="js/footer-loader.js" defer></script>
    <script src="js/main.min.js" defer></script>
    <script src="js/bookshelf.min.js" defer></script>
    <script src="js/bookshelf-browse.min.js" defer></script>
</body>
</html>
