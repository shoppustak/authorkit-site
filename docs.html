<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - AuthorKit</title>
    <meta name="description" content="Complete documentation for AuthorKit WordPress plugins. Installation guides, shortcode reference, developer docs and more.">
    <meta http-equiv="refresh" content="0; url=https://authorkit.gitbook.io/authorkit-documentation">
    <script>window.location.replace("https://authorkit.gitbook.io/authorkit-documentation");</script>

    <!-- DNS prefetch and preconnect for faster font loading -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts with font-display swap to prevent FOIT -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600&display=swap">

    <!-- Optimized CSS (consolidated) -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            background: #FFFFFF;
            font-family: 'Source Serif 4', serif;
        }
        /* Monochrome design overrides */
        .rounded-full, .rounded-lg { border-radius: 0 !important; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; color: #000000; }
        p, span, div { color: #000000; }
    </style>
</head>
<body>
    <!-- Header (Loaded from shared component) -->
    <div id="header-placeholder"></div>

    <!-- Redirect message -->
    <section class="min-h-screen flex items-center justify-center py-20">
        <div class="max-w-lg mx-auto px-4 text-center">
            <div style="width: 64px; height: 64px; background: #f4f2ea; border: 1px solid #000000; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                <svg class="w-8 h-8" style="color: #000000;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>
            <h1 style="font-size: 24px; font-weight: 700; color: #000000; margin-bottom: 12px;">Taking you to the docs...</h1>
            <p style="color: rgba(0, 0, 0, 0.7); margin-bottom: 32px;">AuthorKit documentation is hosted on GitBook. You should be redirected automatically.</p>
            <a href="https://authorkit.gitbook.io/authorkit-documentation"
               style="display: inline-block; background: #059669; color: #FFFFFF; padding: 12px 32px; font-size: 18px; font-weight: 500; border: 2px solid #000000; text-decoration: none;">
                Open Documentation
            </a>
        </div>
    </section>

    <!-- Footer (Loaded from shared component) -->
    <div id="footer-placeholder"></div>

    <!-- No JavaScript needed - page redirects immediately via meta refresh -->
</body>
</html>
