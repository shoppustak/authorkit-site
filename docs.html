<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Documentation...</title>
    <meta name="description" content="Complete documentation for AuthorKit WordPress plugins. Installation guides, shortcode reference, developer docs and more.">
    <meta http-equiv="refresh" content="0; url=https://authorkit.gitbook.io/authorkit-documentation">
    <script>window.location.replace("https://authorkit.gitbook.io/authorkit-documentation");</script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            padding: 3rem 1.5rem;
            margin: 0;
            background: #FFFFFF;
            color: #000000;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
        }
        p {
            font-size: 1.125rem;
            margin: 0 0 1.5rem 0;
        }
        a {
            color: #000000;
            text-decoration: underline;
        }
        a:hover {
            text-decoration: none;
        }
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000000;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>Redirecting to Documentation...</h1>
    <p>If you are not redirected automatically, <a href="https://authorkit.gitbook.io/authorkit-documentation">click here</a>.</p>
</body>
</html>
